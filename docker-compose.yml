services:
  db_mongo:
    image: mongo:7
    container_name: db_mongo
    ports:
      - "${MONGO_PORT}:27017"
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--port", "27017", "--eval", "db.adminCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: db_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
volumes:
  mongo_data: